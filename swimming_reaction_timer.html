<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游泳出發反應時間測試</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen">

    <div class="text-center p-6 bg-gray-800 rounded-xl shadow-xl w-full max-w-sm">
        <h1 class="text-2xl font-bold mb-6">出發反應測試</h1>
        <div id="status" class="text-xl mb-4 text-blue-400 font-mono">準備就緒</div>
        <div id="timer" class="text-5xl font-bold mb-8">0.000 秒</div>
        
        <button id="startBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-lg text-lg font-bold transition">
            開始訓練
        </button>
    </div>

    <script>
        let startTime, timerInterval;
        let isWaitingForBeep = false;
        let isMeasuring = false;
        const THRESHOLD = 15; // 震動靈敏度閾值

        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');
        const timerDiv = document.getElementById('timer');

        // 請求 iOS 權限
        async function requestPermissions() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const response = await DeviceMotionEvent.requestPermission();
                    if (response !== 'granted') {
                        alert("請授予感測器權限以進行測試");
                        return false;
                    }
                } catch (e) {
                    console.error(e);
                    return false;
                }
            }
            return true;
        }

        function playBeep() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = context.createOscillator();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, context.currentTime);
            oscillator.connect(context.destination);
            oscillator.start();
            oscillator.stop(context.currentTime + 0.3); // 嗶聲長度
            
            startTime = Date.now();
            isMeasuring = true;
            statusDiv.innerText = "出發！";
        }

        startBtn.addEventListener('click', async () => {
            const granted = await requestPermissions();
            if (!granted) return;

            statusDiv.innerText = "Take your marks";
            startBtn.disabled = true;
            timerDiv.innerText = "0.000 秒";
            isMeasuring = false;

            // 隨機延遲 1-2 秒
            const delay = Math.random() * 1000 + 1000;
            setTimeout(playBeep, delay);
        });

        // 偵測震動
        window.addEventListener('devicemotion', (event) => {
            if (!isMeasuring) return;

            const acc = event.accelerationIncludingGravity;
            const magnitude = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);

            // 當檢測到重力加速度劇烈變化
            if (magnitude > THRESHOLD) {
                const reactionTime = (Date.now() - startTime) / 1000;
                timerDiv.innerText = reactionTime.toFixed(3) + " 秒";
                statusDiv.innerText = "測試完成";
                isMeasuring = false;
                startBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
