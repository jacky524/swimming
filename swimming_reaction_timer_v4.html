<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游泳出發反應時間測試</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700 text-center">
        <h1 class="text-3xl font-extrabold mb-8 tracking-tight text-white">游泳出發測驗</h1>
        
        <div id="status" class="text-sm uppercase tracking-widest text-blue-400 font-semibold mb-2">準備就緒</div>
        
        <div id="timer" class="text-7xl font-mono font-bold mb-8 text-white">0.000<span class="text-2xl text-slate-500">s</span></div>
        
        <button id="startBtn" class="w-full bg-blue-600 hover:bg-blue-500 active:scale-95 transition-all py-5 rounded-2xl text-xl font-bold shadow-lg shadow-blue-900/50">
            開始訓練
        </button>
    </div>

    <audio id="marksAudio" src="take_your_marks_beep.mp3"></audio>

    <script>
        let startTime;
        let isMeasuring = false;
        const THRESHOLD = 15; // 震動閾值

        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');
        const timerDiv = document.getElementById('timer');
        const marksAudio = document.getElementById('marksAudio');

        // iOS 權限請求
        async function requestPermissions() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const response = await DeviceMotionEvent.requestPermission();
                    return response === 'granted';
                } catch (e) { return false; }
            }
            return true;
        }

        // 播放嗶聲
        function playBeep() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = context.createOscillator();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, context.currentTime);
            oscillator.connect(context.destination);
            oscillator.start();
            oscillator.stop(context.currentTime + 0.5); // 0.5秒長度
            
            startTime = Date.now();
            isMeasuring = true;
            statusDiv.innerText = "出發！";
        }

        startBtn.addEventListener('click', async () => {
            const granted = await requestPermissions();
            if (!granted) { alert("請授予感測器權限"); return; }

            // 播放 MP3
            marksAudio.play();
            statusDiv.innerText = "Take your marks";
            startBtn.disabled = true;
            timerDiv.innerHTML = "0.000<span class='text-2xl text-slate-500'>s</span>";
            isMeasuring = false;

            // 隨機延遲 1.5 - 2.5 秒
            const delay = Math.random() * 1500 + 1000;
            setTimeout(playBeep, delay);
        });

        // 監聽震動
        window.addEventListener('devicemotion', (event) => {
            if (!isMeasuring) return;
            const acc = event.accelerationIncludingGravity;
            const magnitude = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);

            if (magnitude > THRESHOLD) {
                const reactionTime = (Date.now() - startTime) / 1000;
                timerDiv.innerHTML = reactionTime.toFixed(3) + "<span class='text-2xl text-slate-500'>s</span>";
                statusDiv.innerText = "測試完成";
                isMeasuring = false;
                startBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
