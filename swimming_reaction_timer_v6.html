<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游泳出發測驗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-green {
            0%, 100% { background-color: #1e293b; }
            50% { background-color: #065f46; }
        }
        .flash-on-go { animation: pulse-green 0.5s ease-out; }
    </style>
</head>
<body id="body" class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-6 transition-colors duration-200">

    <div class="w-full max-w-sm bg-slate-800 p-8 rounded-[2rem] shadow-2xl border border-slate-700 text-center">
        <div id="status" class="text-xs font-bold uppercase tracking-[0.2em] text-slate-400 mb-4">待機中</div>
        <div id="timer" class="text-[5rem] leading-none font-mono font-black mb-8 text-white">0.000</div>
        <button id="startBtn" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 active:scale-[0.98] transition-all py-6 rounded-2xl text-xl font-bold shadow-lg shadow-blue-900/40">
            開始訓練
        </button>
    </div>

    <audio id="marksAudio" src="take_your_marks_beep.mp3"></audio>
    <audio id="startAudio" src="swim-start-buzzer-sound.mp3"></audio>

    <script>
        let startTime;
        let isMeasuring = false;
        const THRESHOLD = 15;
        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');
        const timerDiv = document.getElementById('timer');
        const body = document.getElementById('body');
        const marksAudio = document.getElementById('marksAudio');
        const startAudio = document.getElementById('startAudio');

        function updateStatus(text, colorClass) {
            statusDiv.innerText = text;
            statusDiv.className = `text-xs font-bold uppercase tracking-[0.2em] mb-4 ${colorClass}`;
        }

        async function requestPermissions() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const response = await DeviceMotionEvent.requestPermission();
                    return response === 'granted';
                } catch (e) { return false; }
            }
            return true;
        }

        // 播放出發 Buzzer
        function playStartBuzzer() {
            startAudio.play();
            startTime = Date.now();
            isMeasuring = true;
            body.classList.add('flash-on-go');
            updateStatus("出發！", "text-emerald-400");
            setTimeout(() => body.classList.remove('flash-on-go'), 500);
        }

        startBtn.addEventListener('click', async () => {
            if (!(await requestPermissions())) { alert("請授予感測器權限"); return; }

            marksAudio.play();
            startBtn.disabled = true;
            startBtn.classList.add('opacity-50');
            updateStatus("Take your marks...", "text-yellow-400");
            timerDiv.innerText = "0.000";

            setTimeout(playStartBuzzer, Math.random() * 1500 + 1500);
        });

        window.addEventListener('devicemotion', (event) => {
            if (!isMeasuring) return;
            const acc = event.accelerationIncludingGravity;
            const magnitude = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);

            if (magnitude > THRESHOLD) {
                const reactionTime = (Date.now() - startTime) / 1000;
                timerDiv.innerText = reactionTime.toFixed(3);
                updateStatus("測試完成", "text-blue-400");
                isMeasuring = false;
                startBtn.disabled = false;
                startBtn.classList.remove('opacity-50');
            }
        });
    </script>
</body>
</html>
